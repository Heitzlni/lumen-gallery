name: Release

# Triggers on tag pushes matching v* (e.g. v6.21.7). Builds the foss
# release APK and attaches it to a GitHub Release named after the tag.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SIGNING_KEY_BASE64       — base64-encoded keystore file (.jks/.keystore)
#                              generate with: base64 -w0 release.keystore
#   SIGNING_STORE_PASSWORD   — keystore password
#   SIGNING_KEY_ALIAS        — key alias inside the keystore
#   SIGNING_KEY_PASSWORD     — password for that key

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "::error::SIGNING_KEY_BASE64 secret is not set"; exit 1
          fi
          echo "$SIGNING_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build foss release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleFossRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/foss/release -name '*.apk' | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::no APK produced"; exit 1
          fi
          # Rename to lumen-gallery-<tag>.apk for the release asset
          TAG=${GITHUB_REF_NAME}
          DEST="$RUNNER_TEMP/lumen-gallery-${TAG}.apk"
          cp "$APK_PATH" "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumen-gallery-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.apk_path }}

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
